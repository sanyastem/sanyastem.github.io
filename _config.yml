title: sanyastem
description: Блог разработчика — гайды по Web, DevOps, Git и инструментам
url: "https://sanyastem.github.io"
baseurl: ""

permalink: /:categories/:slug/

# Defaults: все посты — русские по умолчанию.
# Чтобы добавить английский перевод — положи .md в _posts/en/, он сам станет lang: en
# и доступен по /en/<категория>/<slug>/
defaults:
  - scope:
      path: ""
      type: posts
    values:
      lang: ru
  - scope:
      path: "_posts/en"
      type: posts
    values:
      lang: en
      permalink: /en/:categories/:slug/
  - scope:
      path: "en"
    values:
      lang: en

markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-minifier

# jekyll-minifier: HTML/JSON compression only.
# CSS/JS skipped — gem 0.2.2 mis-detects UTF-8 with Cyrillic and bails out.
# GitHub Pages serves these gzipped (~70% reduction) anyway.
jekyll-minifier:
  preserve_php: false
  remove_comments: true
  compress_css: false
  compress_javascript: false
  compress_json: true
  exclude:
    - "feed.xml"
    - "sitemap.xml"
    - "robots.txt"
    - "llms.txt"
    - "pagefind/**/*"

author:
  name: "Aliaksandr Rubis"
  url: "https://sanyastem.github.io"

feed:
  excerpt_only: false

# Giscus comments — заполни repo_id и category_id через https://giscus.app
# Шаги:
# 1. Включи GitHub Discussions: Settings → General → Discussions ✓
# 2. Установи приложение https://github.com/apps/giscus
# 3. На giscus.app вставь sanyastem/sanyastem.github.io → выбери категорию (Announcements рекомендуется) → скопируй data-repo-id и data-category-id ниже:
giscus:
  repo: "sanyastem/sanyastem.github.io"
  repo_id: ""        # вставь сюда
  category: "Announcements"
  category_id: ""    # и сюда

# Google AdSense — заполни client_id после approval (https://adsense.google.com)
# Шаги:
# 1. Зарегистрируйся на adsense.google.com, добавь сайт sanyastem.github.io
# 2. Скопируй ca-pub-XXXXXXXXXXXXXXXX и вставь в client_id ниже
# 3. Создай ad-юниты в AdSense → Ads → By ad unit → "Display ad"
# 4. Скопируй slot ID каждого юнита и вставь в slots ниже
# 5. Дождись approval (1-4 недели). До этого ads не показываются.
# 6. После approval добавь ads.txt в корень — Jekyll его уже генерит из _config.yml ниже.
adsense:
  enabled: false                        # переключи на true когда approval придёт
  client_id: ""                          # ca-pub-XXXXXXXXXXXXXXXX
  slots:
    in_article: ""                       # slot ID для в-статьи (после 1-го h2)
    sidebar: ""                          # slot ID для sidebar (под TOC на десктопе)
    end_of_article: ""                   # slot ID после статьи (перед related)
    home_grid: ""                        # slot ID на главной (вставка между карточками)
