title: sanyastem
description: Блог разработчика — гайды по Web, DevOps, Git и инструментам
url: "https://sanyastem.github.io"
baseurl: ""

permalink: /:categories/:slug/

markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap
  - jekyll-minifier

# jekyll-minifier: HTML/JSON compression only.
# CSS/JS skipped — gem 0.2.2 mis-detects UTF-8 with Cyrillic and bails out.
# GitHub Pages serves these gzipped (~70% reduction) anyway.
jekyll-minifier:
  preserve_php: false
  remove_comments: true
  compress_css: false
  compress_javascript: false
  compress_json: true
  exclude:
    - "feed.xml"
    - "sitemap.xml"
    - "robots.txt"
    - "llms.txt"
    - "pagefind/**/*"

author:
  name: "Aliaksandr Rubis"
  url: "https://sanyastem.github.io"

feed:
  excerpt_only: false
