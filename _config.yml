title: sanyastem
description: Блог разработчика — гайды по Web, DevOps, Git и инструментам
url: "https://sanyastem.github.io"
baseurl: ""

permalink: /:categories/:slug/

markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

# Giscus — комментарии через GitHub Discussions
# Настрой на https://giscus.app/ и вставь свои значения
giscus:
  repo: "sanyastem/sanyastem.github.io"
  repo_id: ""           # Получишь на giscus.app
  category: "Comments"
  category_id: ""       # Получишь на giscus.app
  mapping: "pathname"
  reactions: true
  theme: "transparent_dark"

# Аналитика (Plausible, Umami или GoatCounter)
# Раскомментируй нужный и вставь свой домен/ID
# analytics:
#   plausible: "sanyastem.github.io"
#   goatcounter: "sanyastem"
